services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: seichi
      POSTGRES_PASSWORD: seichi
      POSTGRES_DB: seichi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_MASTER_KEY: seichi_dev_master_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

volumes:
  postgres_data:
  meili_data:
